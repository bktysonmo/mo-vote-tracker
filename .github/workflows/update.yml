name: Nightly Vote Update

on:
  schedule:
    # Monday and Friday - end of day only (11pm UTC = 6pm Central)
    - cron: '0 23 * * 1'
    - cron: '0 23 * * 5'
    # Tuesday, Wednesday, Thursday - 3x per day
    # 2pm UTC = 9am Central (morning)
    - cron: '0 14 * * 2,3,4'
    # 7pm UTC = 2pm Central (midday)
    - cron: '0 19 * * 2,3,4'
    # 11pm UTC = 6pm Central (end of day)
    - cron: '0 23 * * 2,3,4'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab anytime

jobs:
  update-votes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Need full git history to push back
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv pandas pdfplumber beautifulsoup4

      - name: Run vote fetcher
        env:
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        run: python fetcher.py

      - name: Run summary fetcher
        env:
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        run: python summary_fetcher.py

      - name: Commit and push updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f mo_votes.db
          git diff --staged --quiet || git commit -m "Auto-update: vote refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push